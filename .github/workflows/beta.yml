name: Beta

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    beta:
        name: Beta Build
        runs-on: macos-26
        permissions:
            contents: write
        env:
            WORKSPACE_DIR: ${{ github.workspace }}
            PROJECT_FILE: ${{ github.workspace }}/Project.swift
            CHANGELOG_FILE: ${{ github.workspace }}/CHANGELOG.md
            DERIVED_DATA_DIR: ${{ github.workspace }}/DerivedData
            RELEASE_DIR: ${{ github.workspace }}/DerivedData/Build/Products/Release
            SPARKLE_BIN: ${{ github.workspace }}/Tuist/.build/artifacts/sparkle/Sparkle/bin

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get Current Version
              id: get_version
              run: |
                  SHORT_VERSION=$(grep 'let shortVersionString =' "$PROJECT_FILE" | sed -E 's/.*"([^"]+)".*/\1/')
                  BUILD_VERSION=$(grep 'let buildVersionString =' "$PROJECT_FILE" | sed -E 's/.*"([^"]+)".*/\1/')
                  VERSION="${SHORT_VERSION}.${BUILD_VERSION}"
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "short_version=$SHORT_VERSION" >> $GITHUB_OUTPUT
                  echo "Current Version: $VERSION"

            - name: Get Latest Release Version
              id: get_latest_release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  LATEST_TAG=$(gh release view --json tagName --jq .tagName 2>/dev/null || echo "0.0.0")
                  echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
                  echo "Latest Release Tag: $LATEST_TAG"

            - name: Compare Versions
              id: compare_versions
              run: |
                  CURRENT="${{ steps.get_version.outputs.version }}"
                  LATEST="${{ steps.get_latest_release.outputs.latest_tag }}"

                  CURRENT_CLEAN=$(echo $CURRENT | sed 's/^v//')
                  LATEST_CLEAN=$(echo $LATEST | sed 's/^v//')

                  if [ "$CURRENT_CLEAN" = "$LATEST_CLEAN" ]; then
                    echo "Versions are the same. Skipping beta."
                    echo "should_release=false" >> $GITHUB_OUTPUT
                  else
                    HIGHER=$(printf "$CURRENT_CLEAN\n$LATEST_CLEAN" | sort -V | tail -n1)
                    if [ "$HIGHER" = "$CURRENT_CLEAN" ] && [ "$CURRENT_CLEAN" != "$LATEST_CLEAN" ]; then
                      echo "Current version $CURRENT is higher than latest $LATEST. Proceeding with beta."
                      echo "should_release=true" >> $GITHUB_OUTPUT
                    else
                      echo "Current version $CURRENT is NOT higher than latest $LATEST. Skipping beta."
                      echo "should_release=false" >> $GITHUB_OUTPUT
                    fi
                  fi

            - uses: maxim-lobanov/setup-xcode@v1
              if: steps.compare_versions.outputs.should_release == 'true'
              with:
                  xcode-version: latest

            - name: Setup Swift
              if: steps.compare_versions.outputs.should_release == 'true'
              uses: swift-actions/setup-swift@v2
              with:
                  swift-version: "6.2"

            - name: Install mise
              if: steps.compare_versions.outputs.should_release == 'true'
              uses: jdx/mise-action@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Tuist via mise
              if: steps.compare_versions.outputs.should_release == 'true'
              run: |
                  mise install tuist@4.171.2
                  mise use -g tuist@4.171.2

            - name: Generate Xcode Project
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  TUIST_CONFIG_TOKEN: ${{ secrets.TUIST_CONFIG_TOKEN }}
                  CI: 1
              run: |
                  tuist clean
                  tuist install
                  tuist generate
                  echo "Generated Xcode project"

            - name: Import Signing Certificate
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  APPLE_SIGNING_CERTIFICATE: ${{ secrets.APPLE_SIGNING_CERTIFICATE }}
                  APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
              run: |
                  KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
                  KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
                  CERT_PATH="$RUNNER_TEMP/apple_signing_certificate.p12"

                  printf "%s" "$APPLE_SIGNING_CERTIFICATE" | base64 --decode > "$CERT_PATH" 2>/dev/null || printf "%s" "$APPLE_SIGNING_CERTIFICATE" | base64 -D > "$CERT_PATH"

                  security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security list-keychains -d user -s "$KEYCHAIN_PATH"
                  security default-keychain -d user -s "$KEYCHAIN_PATH"

                  security import "$CERT_PATH" \
                    -k "$KEYCHAIN_PATH" \
                    -P "$APPLE_SIGNING_CERTIFICATE_PASSWORD" \
                    -T /usr/bin/codesign \
                    -T /usr/bin/security \
                    -T /usr/bin/xcodebuild

                  security set-key-partition-list \
                    -S apple-tool:,apple:,codesign: \
                    -s \
                    -k "$KEYCHAIN_PASSWORD" \
                    "$KEYCHAIN_PATH"

                  security find-identity -v -p codesigning "$KEYCHAIN_PATH"

                  echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

            - name: Build Signed App
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  SIGN_CERT_NAME: ${{ secrets.SIGN_CERT_NAME }}
              run: |
                  if [ -z "$SIGN_CERT_NAME" ]; then
                    echo "Missing SIGN_CERT_NAME secret"
                    exit 1
                  fi

                  xcodebuild build \
                    -workspace "$WORKSPACE_DIR/ABPlayer.xcworkspace" \
                    -scheme ABPlayer \
                    -configuration Release \
                    -destination 'platform=macOS' \
                    -derivedDataPath "$DERIVED_DATA_DIR" \
                    CODE_SIGN_STYLE=Manual \
                    CODE_SIGN_IDENTITY="$SIGN_CERT_NAME" \
                    DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
                    ENABLE_HARDENED_RUNTIME=YES \
                    OTHER_CODE_SIGN_FLAGS="--keychain $APPLE_KEYCHAIN_PATH"

            - name: Re-sign App Bundle For Notarization
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  SIGN_CERT_NAME: ${{ secrets.SIGN_CERT_NAME }}
              run: |
                  if [ -z "$SIGN_CERT_NAME" ]; then
                    echo "Missing SIGN_CERT_NAME secret"
                    exit 1
                  fi

                  xcrun codesign --deep --force --verify --verbose \
                    --sign "$SIGN_CERT_NAME" \
                    --options runtime \
                    --timestamp \
                    "$RELEASE_DIR/ABPlayer.app"

            - name: Verify Signed App Bundle
              if: steps.compare_versions.outputs.should_release == 'true'
              run: |
                  codesign --verify --deep --strict --verbose=2 "$RELEASE_DIR/ABPlayer.app"
                  codesign -dv --verbose=4 "$RELEASE_DIR/ABPlayer.app"
                  codesign -dv --verbose=4 "$RELEASE_DIR/ABPlayer.app/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Installer.xpc/Contents/MacOS/Installer"

            - name: Notarize App Bundle
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  SUBMIT_ZIP="$RELEASE_DIR/ABPlayer-notarize.zip"

                  rm -f "$SUBMIT_ZIP"
                  ditto -c -k --sequesterRsrc --keepParent "$RELEASE_DIR/ABPlayer.app" "$SUBMIT_ZIP"

                  NOTARY_OUTPUT=$(xcrun notarytool submit "$SUBMIT_ZIP" \
                    --apple-id "$APPLE_ID" \
                    --password "$APPLE_ID_PASSWORD" \
                    --team-id "$APPLE_TEAM_ID" \
                    --wait \
                    --output-format json)

                  echo "$NOTARY_OUTPUT"

                  NOTARY_SUBMISSION_ID=$(echo "$NOTARY_OUTPUT" | jq -r '.id // empty')
                  NOTARY_STATUS=$(echo "$NOTARY_OUTPUT" | jq -r '.status // empty')

                  if [ "$NOTARY_STATUS" != "Accepted" ]; then
                    echo "Notarization status is '$NOTARY_STATUS'"
                    if [ -n "$NOTARY_SUBMISSION_ID" ]; then
                      xcrun notarytool log "$NOTARY_SUBMISSION_ID" \
                        --apple-id "$APPLE_ID" \
                        --password "$APPLE_ID_PASSWORD" \
                        --team-id "$APPLE_TEAM_ID" || true
                    fi
                    exit 1
                  fi

                  echo "NOTARY_SUBMISSION_ID=$NOTARY_SUBMISSION_ID" >> "$GITHUB_ENV"

            - name: Staple Notarization Ticket
              if: steps.compare_versions.outputs.should_release == 'true'
              run: |
                  for attempt in {1..6}; do
                    if xcrun stapler staple "$RELEASE_DIR/ABPlayer.app" && xcrun stapler validate "$RELEASE_DIR/ABPlayer.app"; then
                      spctl --assess --type execute --verbose=4 "$RELEASE_DIR/ABPlayer.app"
                      exit 0
                    fi

                    echo "Stapling not ready yet (attempt $attempt/6), retrying..."
                    sleep $((attempt * 20))
                  done

                  echo "Failed to staple notarization ticket after retries"
                  exit 1

            - name: Prepare Release Artifact
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
              run: |
                  cd "$RELEASE_DIR"

                  # generate_appcast scans the whole directory and rejects duplicate
                  # archives with the same bundle version.
                  rm -f ABPlayer-notarize.zip

                  ditto -c -k --sequesterRsrc --keepParent ABPlayer.app ABPlayer.zip

                  echo "$SPARKLE_PRIVATE_KEY" > sparkle_key

                  SIGNATURE=$("$SPARKLE_BIN/sign_update" ABPlayer.zip --ed-key-file sparkle_key)
                  echo "Signature: $SIGNATURE"

                  "$SPARKLE_BIN/generate_appcast" . \
                    --ed-key-file sparkle_key \
                    --download-url-prefix "https://s3.kcoding.cn/d/ABPlayerRelease/"

                  if ! grep -q 'url="https://s3.kcoding.cn/d/ABPlayerRelease/ABPlayer.zip"' appcast.xml; then
                    echo "Generated appcast.xml does not point to expected S3 URL"
                    exit 1
                  fi

                  rm sparkle_key
                  mv ABPlayer.zip "$WORKSPACE_DIR/"
                  mv appcast.xml "$WORKSPACE_DIR/"

            - name: Create GitHub Release
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION="${{ steps.get_version.outputs.version }}"
                  NOTES_FILE="$WORKSPACE_DIR/release_notes.txt"

                  if [ -f "$CHANGELOG_FILE" ]; then
                    awk "/^## \[$VERSION\]/{p=1; print; next} /^## \[/{p=0} p" "$CHANGELOG_FILE" > "$NOTES_FILE"
                  fi

                  if [ ! -s "$NOTES_FILE" ]; then
                    echo "Automated beta release for version $VERSION" > "$NOTES_FILE"
                  fi

                  gh release create "$VERSION" "$WORKSPACE_DIR/ABPlayer.zip" "$WORKSPACE_DIR/appcast.xml" --title "$VERSION" --notes-file "$NOTES_FILE"

            - name: Upload dSYM to Sentry
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
              run: |
                  curl -sL https://sentry.io/get-cli/ | sh
                  sentry-cli debug-files upload \
                    --auth-token "$SENTRY_AUTH_TOKEN" \
                    --org "$SENTRY_ORG" \
                    --project "$SENTRY_PROJECT" \
                    "$RELEASE_DIR/ABPlayer.app.dSYM"

            - name: Refresh S3
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  OPENLIST_TOKEN: ${{ secrets.OPENLIST_TOKEN }}
              run: |
                  MODIFIED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                  COMMON_ADDITION='{"root_folder_path":"","repo_structure":"sunset-valley/ABPlayer","show_readme":false,"token":"","show_source_code":false,"show_all_version":false,"gh_proxy":"https://gh-proxy.com/github.com"}'

                  build_payload() {
                    local mount_path="$1"
                    jq -cn \
                      --arg mount_path "$mount_path" \
                      --arg modified "$MODIFIED_AT" \
                      --arg addition "$COMMON_ADDITION" \
                      '{
                        id: 1,
                        mount_path: $mount_path,
                        order: 0,
                        driver: "GitHub Releases",
                        cache_expiration: 30,
                        custom_cache_policies: "",
                        status: "work",
                        addition: $addition,
                        remark: "",
                        modified: $modified,
                        disabled: false,
                        disable_index: true,
                        enable_sign: false,
                        order_by: "",
                        order_direction: "",
                        extract_folder: "front",
                        web_proxy: false,
                        webdav_policy: "302_redirect",
                        proxy_range: false,
                        down_proxy_url: "",
                        disable_proxy_sign: false
                      }'
                  }

                  PAYLOAD_RELEASE_1="$(build_payload "/ABPlayerRelease1")"
                  PAYLOAD_RELEASE="$(build_payload "/ABPlayerRelease")"

                  curl -s -X POST https://s3.kcoding.cn/api/admin/storage/update -H "Authorization: $OPENLIST_TOKEN" -H "Content-Type: application/json;charset=UTF-8" --data-raw "$PAYLOAD_RELEASE_1"
                  curl -s -X POST https://s3.kcoding.cn/api/admin/storage/update -H "Authorization: $OPENLIST_TOKEN" -H "Content-Type: application/json;charset=UTF-8" --data-raw "$PAYLOAD_RELEASE"

            - name: Send Telegram Notification
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
                  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
              run: |
                  VERSION="${{ steps.get_version.outputs.version }}"
                  MESSAGE="Beta Build: $VERSION"
                  curl -s -X POST https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage -d chat_id=$TELEGRAM_TO -d text="$MESSAGE"

            - name: Cleanup Signing Material
              if: always() && steps.compare_versions.outputs.should_release == 'true'
              run: |
                  rm -f "$RUNNER_TEMP/apple_signing_certificate.p12"
                  security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
