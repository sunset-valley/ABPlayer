name: Beta

on:
    push:
        branches: [main]

jobs:
    beta:
        name: Beta Build
        runs-on: macos-26
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get Current Version
              id: get_version
              run: |
                  SHORT_VERSION=$(grep 'let shortVersionString =' Project.swift | sed -E 's/.*"([^"]+)".*/\1/')
                  BUILD_VERSION=$(grep 'let buildVersionString =' Project.swift | sed -E 's/.*"([^"]+)".*/\1/')
                  VERSION="${SHORT_VERSION}.${BUILD_VERSION}"
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "short_version=$SHORT_VERSION" >> $GITHUB_OUTPUT
                  echo "Current Version: $VERSION"

            - name: Get Latest Release Version
              id: get_latest_release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  LATEST_TAG=$(gh release view --json tagName --jq .tagName 2>/dev/null || echo "0.0.0")
                  echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
                  echo "Latest Release Tag: $LATEST_TAG"

            - name: Compare Versions
              id: compare_versions
              run: |
                  CURRENT="${{ steps.get_version.outputs.version }}"
                  LATEST="${{ steps.get_latest_release.outputs.latest_tag }}"

                  CURRENT_CLEAN=$(echo $CURRENT | sed 's/^v//')
                  LATEST_CLEAN=$(echo $LATEST | sed 's/^v//')

                  if [ "$CURRENT_CLEAN" = "$LATEST_CLEAN" ]; then
                    echo "Versions are the same. Skipping beta."
                    echo "should_release=false" >> $GITHUB_OUTPUT
                  else
                    HIGHER=$(printf "$CURRENT_CLEAN\n$LATEST_CLEAN" | sort -V | tail -n1)
                    if [ "$HIGHER" = "$CURRENT_CLEAN" ] && [ "$CURRENT_CLEAN" != "$LATEST_CLEAN" ]; then
                      echo "Current version $CURRENT is higher than latest $LATEST. Proceeding with beta."
                      echo "should_release=true" >> $GITHUB_OUTPUT
                    else
                      echo "Current version $CURRENT is NOT higher than latest $LATEST. Skipping beta."
                      echo "should_release=false" >> $GITHUB_OUTPUT
                    fi
                  fi

            - uses: maxim-lobanov/setup-xcode@v1
              if: steps.compare_versions.outputs.should_release == 'true'
              with:
                  xcode-version: latest

            - name: Setup Swift
              if: steps.compare_versions.outputs.should_release == 'true'
              uses: swift-actions/setup-swift@v2
              with:
                  swift-version: "6.2"

            - name: Install mise
              if: steps.compare_versions.outputs.should_release == 'true'
              uses: jdx/mise-action@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Tuist via mise
              if: steps.compare_versions.outputs.should_release == 'true'
              run: |
                  mise install tuist@4.95.0
                  mise use -g tuist@4.95.0

            - name: Setup Signing Certificate
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  APPLE_SIGNING_CERTIFICATE: ${{ secrets.APPLE_SIGNING_CERTIFICATE }}
                  APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
              run: |
                  KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
                  KEYCHAIN_PASSWORD=$(openssl rand -hex 20)

                  security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

                  echo "$APPLE_SIGNING_CERTIFICATE" | base64 --decode > /tmp/cert.p12
                  security import /tmp/cert.p12 \
                    -k "$KEYCHAIN_PATH" \
                    -P "$APPLE_SIGNING_CERTIFICATE_PASSWORD" \
                    -T /usr/bin/codesign \
                    -T /usr/bin/security
                  rm /tmp/cert.p12

                  security set-key-partition-list \
                    -S apple-tool:,apple: \
                    -s -k "$KEYCHAIN_PASSWORD" \
                    "$KEYCHAIN_PATH"

                  security list-keychain -d user -s "$KEYCHAIN_PATH" \
                    $(security list-keychains -d user | tr -d '"' | xargs)

                  echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
                  echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

            - name: Prepare ffmpeg
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  APPLE_IDENTITY: "Developer ID Application"
              run: |
                  ./scripts/prepare-ffmpeg.sh

            - name: Generate Xcode Project
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  TUIST_CONFIG_TOKEN: ${{ secrets.TUIST_CONFIG_TOKEN }}
                  CI: 1
              run: |
                  tuist clean
                  tuist install
                  tuist generate
                  echo "Generated Xcode project"

            - name: Archive App
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  mkdir -p build
                  xcodebuild archive \
                    -workspace ABPlayer.xcworkspace \
                    -scheme ABPlayer \
                    -configuration Release \
                    -destination 'generic/platform=macOS' \
                    -archivePath build/ABPlayer.xcarchive \
                    CODE_SIGN_IDENTITY="Developer ID Application" \
                    CODE_SIGN_STYLE=Manual \
                    DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
                    PROVISIONING_PROFILE_SPECIFIER=""

            - name: Export Archive
              if: steps.compare_versions.outputs.should_release == 'true'
              run: |
                  xcodebuild -exportArchive \
                    -archivePath build/ABPlayer.xcarchive \
                    -exportPath build/export \
                    -exportOptionsPlist scripts/ExportOptions.plist

            # No notarize/staple, no GitHub release, no Sparkle appcast, no S3

            - name: Upload dSYM to Sentry
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
              run: |
                  curl -sL https://sentry.io/get-cli/ | sh
                  sentry-cli debug-files upload \
                    --auth-token "$SENTRY_AUTH_TOKEN" \
                    --org "$SENTRY_ORG" \
                    --project "$SENTRY_PROJECT" \
                    build/ABPlayer.xcarchive/dSYMs/ABPlayer.app.dSYM

            - name: Cleanup Keychain
              if: steps.compare_versions.outputs.should_release == 'true' && always()
              run: |
                  security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

            - name: Send Telegram Notification
              if: steps.compare_versions.outputs.should_release == 'true'
              env:
                  TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
                  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
              run: |
                  VERSION="${{ steps.get_version.outputs.version }}"
                  MESSAGE="Beta Build: $VERSION"
                  curl -s -X POST https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage -d chat_id=$TELEGRAM_TO -d text="$MESSAGE"
