name: Release

on:
    workflow_dispatch:

jobs:
    release:
        name: Release
        runs-on: macos-26
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get Current Version
              id: get_version
              run: |
                  SHORT_VERSION=$(grep 'let shortVersionString =' Project.swift | sed -E 's/.*"([^"]+)".*/\1/')
                  BUILD_VERSION=$(grep 'let buildVersionString =' Project.swift | sed -E 's/.*"([^"]+)".*/\1/')
                  VERSION="${SHORT_VERSION}.${BUILD_VERSION}"
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "short_version=$SHORT_VERSION" >> $GITHUB_OUTPUT
                  echo "Current Version: $VERSION"

            - uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: latest

            - name: Setup Swift
              uses: swift-actions/setup-swift@v2
              with:
                  swift-version: "6.2"

            - name: Install mise
              uses: jdx/mise-action@v3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Tuist via mise
              run: |
                  mise install tuist@4.95.0
                  mise use -g tuist@4.95.0

            - name: Setup Signing Certificate
              env:
                  APPLE_SIGNING_CERTIFICATE: ${{ secrets.APPLE_SIGNING_CERTIFICATE }}
                  APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
              run: |
                  KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
                  KEYCHAIN_PASSWORD=$(openssl rand -hex 20)

                  security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

                  echo "$APPLE_SIGNING_CERTIFICATE" | base64 --decode > /tmp/cert.p12
                  security import /tmp/cert.p12 \
                    -k "$KEYCHAIN_PATH" \
                    -P "$APPLE_SIGNING_CERTIFICATE_PASSWORD" \
                    -T /usr/bin/codesign \
                    -T /usr/bin/security
                  rm /tmp/cert.p12

                  security set-key-partition-list \
                    -S apple-tool:,apple: \
                    -s -k "$KEYCHAIN_PASSWORD" \
                    "$KEYCHAIN_PATH"

                  security list-keychain -d user -s "$KEYCHAIN_PATH" \
                    $(security list-keychains -d user | tr -d '"' | xargs)

                  echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
                  echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

            - name: Prepare ffmpeg
              env:
                  APPLE_IDENTITY: "Developer ID Application"
              run: |
                  ./scripts/prepare-ffmpeg.sh

            - name: Generate Xcode Project
              env:
                  TUIST_CONFIG_TOKEN: ${{ secrets.TUIST_CONFIG_TOKEN }}
                  CI: 1
              run: |
                  tuist clean
                  tuist install
                  tuist generate
                  echo "Generated Xcode project"

            - name: Archive App
              env:
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  mkdir -p build
                  xcodebuild archive \
                    -workspace ABPlayer.xcworkspace \
                    -scheme ABPlayer \
                    -configuration Release \
                    -destination 'generic/platform=macOS' \
                    -archivePath build/ABPlayer.xcarchive \
                    CODE_SIGN_IDENTITY="Developer ID Application" \
                    CODE_SIGN_STYLE=Manual \
                    DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
                    PROVISIONING_PROFILE_SPECIFIER=""

            - name: Export Archive
              run: |
                  xcodebuild -exportArchive \
                    -archivePath build/ABPlayer.xcarchive \
                    -exportPath build/export \
                    -exportOptionsPlist scripts/ExportOptions.plist

            - name: Notarize and Staple
              env:
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: |
                  ditto -c -k --keepParent build/export/ABPlayer.app build/ABPlayer-notarize.zip

                  xcrun notarytool submit build/ABPlayer-notarize.zip \
                    --apple-id "$APPLE_ID" \
                    --password "$APPLE_ID_PASSWORD" \
                    --team-id "$APPLE_TEAM_ID" \
                    --wait

                  xcrun stapler staple build/export/ABPlayer.app
                  rm build/ABPlayer-notarize.zip

            - name: Prepare Release Artifact
              env:
                  SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
              run: |
                  cd build/export

                  zip -r ABPlayer.zip ABPlayer.app

                  SPARKLE_BIN="../../Tuist/.build/artifacts/sparkle/Sparkle/bin"

                  echo "$SPARKLE_PRIVATE_KEY" > sparkle_key

                  SIGNATURE=$("$SPARKLE_BIN/sign_update" ABPlayer.zip --ed-key-file sparkle_key)
                  echo "Signature: $SIGNATURE"

                  "$SPARKLE_BIN/generate_appcast" . \
                    --ed-key-file sparkle_key \
                    --download-url-prefix "http://s3.kcoding.cn/d/ABPlayerRelease/"

                  if ! grep -q 'url="http://s3.kcoding.cn/d/ABPlayerRelease/ABPlayer.zip"' appcast.xml; then
                    echo "Generated appcast.xml does not point to expected S3 URL"
                    exit 1
                  fi

                  rm sparkle_key

                  mv ABPlayer.zip ../../
                  mv appcast.xml ../../
                  cd ../../

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION="${{ steps.get_version.outputs.version }}"
                  NOTES_FILE="release_notes.txt"

                  if [ -f "CHANGELOG.md" ]; then
                    awk "/^## \[$VERSION\]/{p=1; print; next} /^## \[/{p=0} p" CHANGELOG.md > "$NOTES_FILE"
                  fi

                  if [ ! -s "$NOTES_FILE" ]; then
                    echo "Automated release for version $VERSION" > "$NOTES_FILE"
                  fi

                  gh release create "$VERSION" ABPlayer.zip appcast.xml --title "$VERSION" --notes-file "$NOTES_FILE"

            - name: Upload dSYM to Sentry
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
              run: |
                  curl -sL https://sentry.io/get-cli/ | sh
                  sentry-cli debug-files upload \
                    --auth-token "$SENTRY_AUTH_TOKEN" \
                    --org "$SENTRY_ORG" \
                    --project "$SENTRY_PROJECT" \
                    build/ABPlayer.xcarchive/dSYMs/ABPlayer.app.dSYM

            - name: Cleanup Keychain
              if: always()
              run: |
                  security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

            - name: Refresh S3
              env:
                  OPENLIST_TOKEN: ${{ secrets.OPENLIST_TOKEN }}
              run: |
                  MODIFIED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                  COMMON_ADDITION='{"root_folder_path":"","repo_structure":"sunset-valley/ABPlayer","show_readme":false,"token":"","show_source_code":false,"show_all_version":false,"gh_proxy":"https://gh-proxy.com/github.com"}'

                  build_payload() {
                    local mount_path="$1"
                    jq -cn \
                      --arg mount_path "$mount_path" \
                      --arg modified "$MODIFIED_AT" \
                      --arg addition "$COMMON_ADDITION" \
                      '{
                        id: 1,
                        mount_path: $mount_path,
                        order: 0,
                        driver: "GitHub Releases",
                        cache_expiration: 30,
                        custom_cache_policies: "",
                        status: "work",
                        addition: $addition,
                        remark: "",
                        modified: $modified,
                        disabled: false,
                        disable_index: true,
                        enable_sign: false,
                        order_by: "",
                        order_direction: "",
                        extract_folder: "front",
                        web_proxy: false,
                        webdav_policy: "302_redirect",
                        proxy_range: false,
                        down_proxy_url: "",
                        disable_proxy_sign: false
                      }'
                  }

                  PAYLOAD_RELEASE_1="$(build_payload "/ABPlayerRelease1")"
                  PAYLOAD_RELEASE="$(build_payload "/ABPlayerRelease")"

                  curl -s -X POST https://s3.kcoding.cn/api/admin/storage/update -H "Authorization: $OPENLIST_TOKEN" -H "Content-Type: application/json;charset=UTF-8" --data-raw "$PAYLOAD_RELEASE_1"
                  curl -s -X POST https://s3.kcoding.cn/api/admin/storage/update -H "Authorization: $OPENLIST_TOKEN" -H "Content-Type: application/json;charset=UTF-8" --data-raw "$PAYLOAD_RELEASE"

            - name: Send Telegram Notification
              env:
                  TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
                  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
              run: |
                  VERSION="${{ steps.get_version.outputs.version }}"
                  MESSAGE="Release Success: $VERSION"
                  curl -s -X POST https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage -d chat_id=$TELEGRAM_TO -d text="$MESSAGE"
